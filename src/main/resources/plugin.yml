name: XMPay
version: '${project.version}'
main: cn.xmpay.plugin.XMPayPlugin
api-version: '1.20'
description: 游戏内易支付插件，支持地图二维码、Vault/点券对接、多身份指令
authors: [XMJ]
website: https://github.com/XMJjs/XMPay

softdepend:
  - Vault
  - PlaceholderAPI
  - PlayerPoints
  - EssentialsX

commands:
  xmpay:
    description: XMPay主命令
    usage: /xmpay <help|pay|order|reload|admin>
    aliases: [xp, pay]
    permission: xmpay.use

  xmpayadmin:
    description: XMPay管理员命令
    usage: /xmpayadmin <reload|setrate|toggle|info>
    permission: xmpay.admin

permissions:
  xmpay.use:
    description: 允许使用XMPay基本功能
    default: true

  xmpay.pay:
    description: 允许发起支付
    default: true

  xmpay.order.query:
    description: 允许查询订单
    default: true

  xmpay.order.refund:
    description: 允许申请退款
    default: op

  xmpay.admin:
    description: 允许使用管理员命令
    default: op

  xmpay.vip:
    description: VIP玩家权限（可绑定自定义指令）
    default: false

  xmpay.bypass:
    description: 跳过手续费
    default: op
